name: Selenium BDD Tests
on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tags to run, example @contest'
        required: false
        default: ''
      env:
        description: 'Test environment from application.properties'
        required: false
        default: 'dev'
      reset_db:
        description: 'Run scripts/reset-test-db.sh --yes before tests'
        required: false
        type: boolean
        default: true
      run_marker:
        description: 'Unique identifier injected by the calling workflow'
        required: false
        default: ''
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e-tests:
    name: Run Selenium BDD tests
    runs-on: self-hosted
    timeout-minutes: 180

    env:
      ENV_NAME: ${{ github.event.inputs.env || 'dev' }}
      TAGS: ${{ github.event.inputs.tags || '' }}
      RESET_DB: ${{ github.event.inputs.reset_db || 'true' }}
      HEADLESS: 'true'

    steps:
      - name: Checkout tests repository
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          chmod +x ./gradlew
          chmod +x scripts/reset-test-db.sh

      - name: Reset test database
        if: env.RESET_DB == 'true'
        run: scripts/reset-test-db.sh --yes

      - name: Run BDD tests with automatic retry
        run: |
          set -e
          if [ -n "$TAGS" ]; then
            ./gradlew clean executeBDDTests --no-daemon -Denv="$ENV_NAME" -Dheadless="$HEADLESS" -Dtags="$TAGS"
          else
            ./gradlew clean executeBDDTests --no-daemon -Denv="$ENV_NAME" -Dheadless="$HEADLESS"
          fi

      - name: Prepare GitHub Pages report
        if: always()
        run: |
          set -euo pipefail
          rm -rf build/pages
          mkdir -p build/pages/allure build/pages/cucumber build/pages/screenshots
          touch build/pages/.nojekyll

          # Gradle Allure creates build/reports/allure-report/allureReport/index.html.
          # Publish the contents under /allure/ so /allure/index.html works.
          if [ -d build/reports/allure-report/allureReport ]; then
            cp -r build/reports/allure-report/allureReport/. build/pages/allure/
          elif [ -d build/reports/allure-report ]; then
            cp -r build/reports/allure-report/. build/pages/allure/
          fi

          if [ -d build/reports/cucumber ]; then
            cp -r build/reports/cucumber/. build/pages/cucumber/
          fi

          if [ ! -f build/pages/cucumber/consolidated.html ]; then
            cat > build/pages/cucumber/consolidated.html <<'EOF'
          <!doctype html>
          <html lang="es">
          <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reporte Cucumber consolidado</title></head>
          <body>
            <h1>Reporte Cucumber consolidado</h1>
            <p>No se generó reporte Cucumber consolidado para esta corrida. Revisa los logs del job y los artefactos disponibles.</p>
            <p><a href="../">Volver al índice</a></p>
          </body>
          </html>
          EOF
          fi

          if [ -d build/reports/screenshots ]; then
            cp -r build/reports/screenshots/. build/pages/screenshots/
          fi

          cat > build/pages/index.html <<EOF
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Patito Selenium Reports</title>
          </head>
          <body>
            <h1>Patito Selenium Reports</h1>
            <p>Reportes generados por GitHub Actions.</p>
            <p>Run: <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">#${GITHUB_RUN_NUMBER}</a></p>
            <ul>
              <li><a href="./allure/index.html">Allure Report consolidado</a></li>
              <li><a href="./cucumber/consolidated.html">Reporte Cucumber consolidado</a></li>
              <li><a href="./cucumber/">Reportes Cucumber por feature y reintentos</a></li>
              <li><a href="./screenshots/">Screenshots</a></li>
            </ul>
          </body>
          </html>
          EOF

          cat > build/pages/cucumber/index.html <<'EOF'
          <!doctype html>
          <html lang="es">
          <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cucumber Reports</title></head>
          <body>
            <h1>Cucumber Reports</h1>
            <p><a href="../">Volver al índice</a></p>
            <p><a href="./consolidated.html">Ver reporte consolidado con reintentos</a></p>
            <ul>
          EOF
          find build/pages/cucumber -maxdepth 1 -type f -name '*.html' ! -name 'index.html' -printf '%f\n' | sort | while read -r file; do
            printf '              <li><a href="./%s">%s</a></li>\n' "$file" "$file" >> build/pages/cucumber/index.html
          done
          cat >> build/pages/cucumber/index.html <<'EOF'
            </ul>
          </body>
          </html>
          EOF

          cat > build/pages/screenshots/index.html <<'EOF'
          <!doctype html>
          <html lang="es">
          <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Screenshots</title></head>
          <body>
            <h1>Screenshots</h1>
            <p><a href="../">Volver al índice</a></p>
            <ul>
          EOF
          find build/pages/screenshots -maxdepth 1 -type f -name '*.png' -printf '%f\n' | sort | while read -r file; do
            printf '              <li><a href="./%s">%s</a></li>\n' "$file" "$file" >> build/pages/screenshots/index.html
          done
          cat >> build/pages/screenshots/index.html <<'EOF'
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ github.run_number }}
          path: |
            build/reports/cucumber/**
            build/reports/tests/**
            build/reports/screenshots/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: |
            build/reports/allure-report/**
            build/allure-results/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Setup GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

  deploy-pages:
    name: Deploy reports to GitHub Pages
    needs: e2e-tests
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
